<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KostManager Pro - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p {
            color: #6B7280;
            font-size: 13px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #8B5CF6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9CA3AF;
        }
        .input-icon input {
            padding-left: 44px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8B5CF6 0%, #6B21A5 100%);
            color: white;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-outline {
            background: transparent;
            border: 2px solid #8B5CF6;
            color: #6B21A5;
        }
        .toggle-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #F3F4F6;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #8B5CF6 0%, #6B21A5 100%);
            color: white;
        }
        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }
        .alert-error {
            background: #FEE2E2;
            color: #B91C1C;
            border: 1px solid #FECACA;
        }
        .alert-success {
            background: #DCFCE7;
            color: #15803D;
            border: 1px solid #BBF7D0;
        }
        .info-text {
            text-align: center;
            font-size: 11px;
            color: #9CA3AF;
            margin-top: 20px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-building" style="font-size: 48px; color: #8B5CF6;"></i>
            <h1>KostManager Pro</h1>
            <p>Manajemen Kost + Pembukuan via WhatsApp</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <div class="toggle-buttons">
            <button class="toggle-btn active" onclick="setMode('login')">🔐 Login</button>
            <button class="toggle-btn" onclick="setMode('register')">📝 Daftar Baru</button>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label>📱 Nomor WhatsApp</label>
                <div class="input-icon">
                    <i class="fab fa-whatsapp"></i>
                    <input type="tel" id="login_wa" placeholder="6281234567890">
                </div>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login_password" placeholder="Masukkan password">
                </div>
            </div>
            <button class="btn btn-primary" onclick="login()" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>

        <div id="registerForm" style="display: none;">
            <div class="form-group">
                <label>📱 Nomor WhatsApp</label>
                <div class="input-icon">
                    <i class="fab fa-whatsapp"></i>
                    <input type="tel" id="reg_wa" placeholder="6281234567890">
                </div>
                <small style="color: #6B7280; font-size: 10px;">Gunakan nomor aktif untuk menerima tagihan</small>
            </div>
            <div class="form-group">
                <label>🏠 Nama Kost</label>
                <div class="input-icon">
                    <i class="fas fa-building"></i>
                    <input type="text" id="reg_nama_kost" placeholder="Contoh: Kost Bahagia">
                </div>
            </div>
            <div class="form-group">
                <label>🔒 Password</label>
                <div class="input-icon">
                    <i class="fas fa-key"></i>
                    <input type="password" id="reg_password" placeholder="Minimal 6 karakter">
                </div>
            </div>
            <div class="form-group">
                <label>🔁 Konfirmasi Password</label>
                <div class="input-icon">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="reg_password2" placeholder="Ulangi password">
                </div>
            </div>
            <button class="btn btn-primary" onclick="register()" id="registerBtn">
                <i class="fas fa-user-plus"></i> Daftar Sekarang
            </button>
        </div>

        <div class="info-text">
            <i class="fas fa-shield-alt"></i> Data aman dengan enkripsi<br>
            <i class="fab fa-whatsapp"></i> Login hanya dengan nomor WhatsApp
        </div>
    </div>

    <script>
        // ============ KONFIGURASI FIREBASE ============
        const firebaseConfig = {
            apiKey: "AIzaSyCrVmYmY6kktOjbhuc5I3LlqbgxzwWUoSI",
            authDomain: "manajemen-kost-68569.firebaseapp.com",
            projectId: "manajemen-kost-68569",
            storageBucket: "manajemen-kost-68569.firebasestorage.app",
            messagingSenderId: "202199285940",
            appId: "1:202199285940:web:27f76df48f12b039fb97e1",
            measurementId: "G-JBHV6G9GVL"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const SALT = "kostmanager_salt_2024";

        let currentMode = "login";

        function setMode(mode) {
            currentMode = mode;
            if (mode === "login") {
                document.getElementById("loginForm").style.display = "block";
                document.getElementById("registerForm").style.display = "none";
                document.querySelectorAll(".toggle-btn")[0].classList.add("active");
                document.querySelectorAll(".toggle-btn")[1].classList.remove("active");
            } else {
                document.getElementById("loginForm").style.display = "none";
                document.getElementById("registerForm").style.display = "block";
                document.querySelectorAll(".toggle-btn")[0].classList.remove("active");
                document.querySelectorAll(".toggle-btn")[1].classList.add("active");
            }
            hideAlert();
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById("alertBox");
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = "block";
            setTimeout(() => {
                alertBox.style.display = "none";
            }, 4000);
        }

        function hideAlert() {
            document.getElementById("alertBox").style.display = "none";
        }

        function hashPassword(password) {
            return CryptoJS.SHA256(password + SALT).toString();
        }

        async function login() {
            const noWa = document.getElementById("login_wa").value.trim();
            const password = document.getElementById("login_password").value;
            const btn = document.getElementById("loginBtn");

            if (!noWa || !password) {
                showAlert("Isi semua field!", "error");
                return;
            }

            if (!noWa.match(/^62[0-9]{9,13}$/)) {
                showAlert("Nomor WA harus diawali 62 dan 10-14 digit!", "error");
                return;
            }

            btn.innerHTML = '<span class="spinner"></span> Memeriksa...';
            btn.disabled = true;

            try {
                const hashedPass = hashPassword(password);
                const userRef = db.collection("users").doc(noWa);
                const userDoc = await userRef.get();

                if (!userDoc.exists) {
                    showAlert("Nomor WA belum terdaftar!", "error");
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    btn.disabled = false;
                    return;
                }

                const userData = userDoc.data();
                
                if (userData.password !== hashedPass) {
                    showAlert("Password salah!", "error");
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    btn.disabled = false;
                    return;
                }

                if (userData.status !== "aktif") {
                    showAlert("Akun Anda dinonaktifkan. Hubungi admin!", "error");
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    btn.disabled = false;
                    return;
                }

                if (userData.expired_at && new Date(userData.expired_at) < new Date()) {
                    showAlert("Lisensi Anda sudah habis! Hubungi admin untuk perpanjang.", "error");
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                    btn.disabled = false;
                    return;
                }

                await userRef.update({
                    last_login: new Date().toISOString()
                });

                localStorage.setItem("kost_user", JSON.stringify({
                    no_wa: noWa,
                    nama_kost: userData.nama_kost,
                    alamat: userData.alamat || "",
                    rekening: userData.rekening || ""
                }));

                showAlert("Login berhasil! Mengalihkan...", "success");
                
                setTimeout(() => {
                    window.location.href = "app.html";
                }, 1500);

            } catch (error) {
                console.error(error);
                showAlert("Terjadi kesalahan: " + error.message, "error");
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                btn.disabled = false;
            }
        }

        async function register() {
            const noWa = document.getElementById("reg_wa").value.trim();
            const namaKost = document.getElementById("reg_nama_kost").value.trim();
            const password = document.getElementById("reg_password").value;
            const password2 = document.getElementById("reg_password2").value;
            const btn = document.getElementById("registerBtn");

            if (!noWa || !namaKost || !password || !password2) {
                showAlert("Isi semua field!", "error");
                return;
            }

            if (!noWa.match(/^62[0-9]{9,13}$/)) {
                showAlert("Nomor WA harus diawali 62 dan 10-14 digit!", "error");
                return;
            }

            if (password.length < 6) {
                showAlert("Password minimal 6 karakter!", "error");
                return;
            }

            if (password !== password2) {
                showAlert("Password tidak cocok!", "error");
                return;
            }

            btn.innerHTML = '<span class="spinner"></span> Mendaftar...';
            btn.disabled = true;

            try {
                const existingUser = await db.collection("users").doc(noWa).get();
                if (existingUser.exists) {
                    showAlert("Nomor WhatsApp sudah terdaftar! Silakan login.", "error");
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Daftar Sekarang';
                    btn.disabled = false;
                    return;
                }

                const hashedPass = hashPassword(password);
                
                const expiredDate = new Date();
                expiredDate.setFullYear(expiredDate.getFullYear() + 1);

                await db.collection("users").doc(noWa).set({
                    no_wa: noWa,
                    nama_kost: namaKost,
                    password: hashedPass,
                    alamat: "",
                    rekening: "",
                    status: "aktif",
                    expired_at: expiredDate.toISOString().split('T')[0],
                    created_at: new Date().toISOString(),
                    last_login: new Date().toISOString()
                });

                await db.collection("kost_data").doc(noWa).set({
                    penyewa: [],
                    kamar: [
                        { id: "k1", nomor: "A01", harga: 850000, status: "kosong" },
                        { id: "k2", nomor: "A02", harga: 850000, status: "kosong" }
                    ],
                    transaksi: [],
                    pengaturan: {
                        nama_kost: namaKost,
                        alamat: "",
                        rekening: ""
                    }
                });

                showAlert("Pendaftaran berhasil! Silakan login.", "success");
                
                document.getElementById("reg_wa").value = "";
                document.getElementById("reg_nama_kost").value = "";
                document.getElementById("reg_password").value = "";
                document.getElementById("reg_password2").value = "";
                
                setMode("login");

            } catch (error) {
                console.error(error);
                showAlert("Terjadi kesalahan: " + error.message, "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Daftar Sekarang';
                btn.disabled = false;
            }
        }

        function checkExistingSession() {
            const savedUser = localStorage.getItem("kost_user");
            if (savedUser) {
                window.location.href = "app.html";
            }
        }

        checkExistingSession();
    </script>
</body>
</html>
